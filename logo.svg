<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <defs>
    <filter id="maGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="priceGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="bigBlur"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="smallBlur"/>
      <feMerge>
        <feMergeNode in="bigBlur"/>
        <feMergeNode in="smallBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="maGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>

    <linearGradient id="priceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="85%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1e293b" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="56" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#grid)" opacity="0.6"/>
  <rect x="0" y="0" width="56" height="56" rx="12" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- Moving Average line -->
  <path d="M 6 40 Q 16 38 26 36 Q 36 34 50 32"
        fill="none"
        stroke="url(#maGrad)"
        stroke-width="1.5"
        stroke-linecap="round"
        filter="url(#maGlow)"
        opacity="0.9"/>

  <!-- Price line -->
  <path d="M 6 24 L 12 32 L 18 44 L 26 36 L 36 16 L 44 28 L 50 20"
        fill="none"
        stroke="url(#priceGrad)"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#priceGlow)"/>

  <!-- Bounce touch point -->
  <circle cx="26" cy="36" r="2.5" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5" filter="url(#dotGlow)"/>
  <circle cx="26" cy="36" r="1" fill="#7dd3fc"/>

  <!-- Signal dot -->
  <circle cx="44" cy="28" r="3.5" fill="#0f172a" stroke="#f0abfc" stroke-width="1.5" filter="url(#dotGlow)"/>
  <circle cx="44" cy="28" r="1.5" fill="#f0abfc"/>

  <!-- Pulse ring -->
  <circle cx="44" cy="28" r="6.5" fill="none" stroke="#f0abfc" stroke-width="0.5" opacity="0.4"/>
</svg>